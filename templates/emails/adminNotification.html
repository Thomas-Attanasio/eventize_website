<!DOCTYPE html>
<html>
<body style="font-family: 'Georgia', serif; color: #333; background-color: #f4f0f6; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; border: 1px solid #7C5F8D;">
        <div style="background-color: #7C5F8D; padding: 20px; text-align: center; color: white;">
            <h1 style="margin: 0;">Nuova Richiesta Demo</h1>
        </div>
        <div style="padding: 30px;">
            <p>Hai ricevuto una nuova richiesta di contatto dal sito <strong>Eventize</strong>.</p>
            
            <table style="width: 100%; border-collapse: collapse;">
                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;"><strong>Nome:</strong></td>

                    <td style="padding: 10px; border-bottom: 1px solid #eee;">{{ nome }}</td>
                </tr>

                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;"><strong>Azienda:</strong></td>

                    <td style="padding: 10px; border-bottom: 1px solid #eee;">{{ azienda }}</td>
                </tr>

                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;"><strong>Email:</strong></td>

                    <td style="padding: 10px; border-bottom: 1px solid #eee;"><a href="mailto:{{ email }}" style="color: #7C5F8D;">{{ email }}</a></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
